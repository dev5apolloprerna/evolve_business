
<html>

<body>

    <style>
        table td {
            border-collapse: collapse !important;

    </style>

    <section class="section-pad">

            <table style="width:40%;border-collapse: collapse !important;">
                <tr>
                    <td style="text-align:center;border: 1px solid #633718;">

                                <img style="margin-bottom:10px;" width="200" height="100" src="https://evolv.co.in/evolve_business/assets/images/logo.png" alt="evolve Logo">
                            </a>
                    </td>
                </tr>
                <tr>
                    <td
                        style="font-weight: 700;text-align: center;background: linear-gradient(to right, #78c046,#26a9cd) !important;padding: 3px 5px;color: white;text-transform: uppercase;font-size: 17px;border: 1px solid #633718;">
                        Reference Status Update</td>
                </tr>
            </table>
            <table style="width:40%;border-collapse: collapse !important;">
               
               
                <tr>
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Reference from</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#Reference_from</td>

                <tr>
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Reference To:</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#Reference_to</td>
                </tr>
                <tr>
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Reference Name:</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#Reference_Name</td>
                </tr>
                <tr>
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Company Name:</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#Company_Name</td>
                </tr>
                <tr>
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Phone Number:</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#phonenumber</td>
                </tr>
                <tr>
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Reference Date:</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#Reference_Date</td>

                <tr>

                    </td>
                </tr>
                <tr id="reject_comment_row" style="display: none;">
                    <td style="padding: 0px 5px;width:30%;border: 1px solid #633718;color:black">Rejection Comment:</td>
                    <td style="width:70%;border: 1px solid #633718;color:black">#rejection_comment</td>
